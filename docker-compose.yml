services:
  backend:
    ports:
    - "5001:5000"
    container_name: realiti
    build:
      context: ./backend
    env_file: ./.env
  db:
    image: postgres
    container_name: realitiDB
    environment:
      POSTGRES_DB: ${POSTGRES_DB} 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
