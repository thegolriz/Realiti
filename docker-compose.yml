services:
  backend:
    container_name: baileeann-backend
    build:
      context: ./backend
    env_file: ./.env
  db:
    image: postgres
    container_name: baileeann_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB} 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: $(POSTGRES_PASSWORD)
